<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuario - Catalogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e6f6ff 0%, #f9fcff 50%, #e6fff2 100%);
            color: #1f2d3d;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(24, 39, 75, 0.12);
            overflow: hidden;
        }

        .card-header {
            background-color: #2980b9;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.2rem;
            letter-spacing: 0.3px;
        }

        .card-body {
            padding: 22px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d4dbe3;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #ffffff;
        }

        input:focus,
        select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.16);
        }

        button {
            width: 100%;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            color: #ffffff;
            background-color: #27ae60;
            transition: background-color 0.2s;
            margin-top: 4px;
        }

        button:hover {
            background-color: #219a52;
        }

        .alert {
            margin-bottom: 14px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.88rem;
        }

        .alert-error {
            background-color: #fdecea;
            color: #9f3a38;
            border: 1px solid #f2c7c4;
        }

        .alert-success {
            background-color: #eaf8ef;
            color: #2a7b43;
            border: 1px solid #c5e9d1;
        }

        .footer-link {
            margin-top: 12px;
            text-align: center;
        }

        .footer-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>Cadastrar novo usuario</h1>
    </div>

    <div class="card-body">
        <div th:if="${param.sucesso}" class="alert alert-success">
            Usuario cadastrado com sucesso.
        </div>

        <div th:if="${param.erro}" class="alert alert-error">
            Nao foi possivel cadastrar o usuario.
        </div>

        <form th:action="@{/usuarios/salvar}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="nomeCompleto">Nome completo</label>
                <input id="nomeCompleto" type="text" name="nomeCompleto" required>
            </div>

            <div class="field">
                <label for="username">Usuario</label>
                <input id="username" type="text" name="username" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" required>
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <input id="senha" type="password" name="senha" minlength="4" required>
            </div>

            <div class="field">
                <label for="confirmarSenha">Confirmar senha</label>
                <input id="confirmarSenha" type="password" name="confirmarSenha" minlength="4" required>
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil">
                    <option value="USER">Usuario</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <button type="submit">Cadastrar usuario</button>
        </form>

        <div class="footer-link">
            <a href="/login">Voltar para login</a>
        </div>

        <div class="footer-link">
            <a href="/produtos">Ir para catalogo</a>
        </div>
    </div>
</div>
</body>
</html>
